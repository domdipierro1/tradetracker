<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1D4ED8"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Chart bars -->
  <rect x="10" y="38" width="8" height="14" rx="2" fill="rgba(255,255,255,0.4)"/>
  <rect x="21" y="28" width="8" height="24" rx="2" fill="rgba(255,255,255,0.6)"/>
  <rect x="32" y="20" width="8" height="32" rx="2" fill="white"/>
  <rect x="43" y="32" width="8" height="20" rx="2" fill="rgba(255,255,255,0.6)"/>
  <!-- Upward trend line -->
  <polyline points="14,42 25,32 36,24 47,36" fill="none" stroke="#60A5FA" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dot on trend -->
  <circle cx="47" cy="36" r="3" fill="#93C5FD"/>
  <!-- TT text -->
  <text x="32" y="14" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="800" fill="rgba(255,255,255,0.9)" letter-spacing="1">TT</text>
</svg>